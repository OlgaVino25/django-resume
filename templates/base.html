{% load static %}
<!doctype html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Моё портфолио{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/custom.css' %}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Фавикон (если есть) -->
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}" />
  </head>
  <body class="d-flex flex-column h-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <!-- Кнопка-гамбургер для мобильных -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Само меню (сворачиваемое) -->
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="/about/">Обо мне</a></li>
            <li class="nav-item"><a class="nav-link" href="/projects/">Проекты</a></li>
            <li class="nav-item"><a class="nav-link" href="/skills/">Навыки</a></li>
            <li class="nav-item"><a class="nav-link" href="/resume/">Резюме</a></li>
            <li class="nav-item"><a class="nav-link" href="/contacts/">Контакты</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Основной контент -->
    <main class="flex-shrink-0">
      <div class="container my-4">{% block content %} {% endblock %}</div>
    </main>

    <!-- Футер (всегда внизу) -->
    <footer class="footer mt-auto py-3 bg-dark text-white text-center">
      <div class="container">
        <!-- Блок контактов -->
        <div class="mb-2">
          <a href="mailto:olgavinokyrova25@yandex.ru" class="text-white me-3">Email</a>
          <a href="https://github.com/OlgaVino25?tab=repositories" target="_blank" class="text-white me-3">GitHub</a>
          <a href="https://t.me/OlgaVino25" target="_blank" class="text-white">@OlgaVino25</a>
        </div>
        <!-- Копирайт -->
        <span>© 2026 Винокурова Ольга</span>
      </div>
    </footer>

    <!-- Bootstrap JS (локальный) -->
    <button id="back-to-top" class="btn btn-primary" title="Наверх" onclick="scrollToTop()">Вверх</button>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>
  </body>
</html>
